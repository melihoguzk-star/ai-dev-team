name: ProteinOcean
options:
  bundleIdPrefix: com.proteinocean
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES

targets:
  ProteinOcean:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ProteinOcean
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proteinocean.app
        PRODUCT_NAME: ProteinOcean
        INFOPLIST_FILE: ProteinOcean/App/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_EMIT_LOC_STRINGS: YES
